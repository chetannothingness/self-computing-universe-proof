# O.toml — Machine-readable problem registry
# Links Lean4 statements to Rust-side statement_hash in ProofEq.
# Each entry specifies the problem ID, status, statement file, and schema used.

[universe]
version = "1.1.0"
lean_version = "v4.16.0"
total_problems = 20
verified_count = 14
invalid_count = 6

[irc]
framework_file = "KernelVm/Invariant.lean"
invsyn_file = "KernelVm/InvSyn.lean"
deciders_file = "KernelVm/Deciders.lean"
soundness_file = "KernelVm/Soundness.lean"
irc_proved = 14
irc_frontier = 6
discharge_method = "InvSyn"

# ============================================================
# VERIFIED problems — FRC exists, VM program halts with code 1
# ============================================================

[[problems]]
id = "goldbach"
name = "Goldbach Conjecture (bounded)"
status = "VERIFIED"
statement_file = "OpenProblems/Goldbach/Statement.lean"
invariant_file = "OpenProblems/Goldbach/Invariant.lean"
irc_status = "PROVED"
schema = "BoundedCounterexample"
predicate = "goldbachBounded"
default_params = { lo = 4, hi = 100 }

